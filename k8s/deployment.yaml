apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-live-acs-demo
  namespace: voice-live-demo
  labels:
    app.kubernetes.io/name: voice-live-acs-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: voice-live-acs-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-live-acs-demo
    spec:
      containers:
        - name: app
          image: tileforgeacr.azurecr.io/voice-live-acs-demo:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: voice-live-acs-demo-env
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
